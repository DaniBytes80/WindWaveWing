name: Evaluación de alertas meteorológicas
 
on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:
 
jobs:
  ingesta_grid:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
 
    steps:
      - uses: actions/checkout@v4
 
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
 
      - name: Instalar dependencias
        run: pip install -r tfg_backend/requirements.txt
 
      - name: Ingestar grid global
        run: python tfg_backend/ingesta_grid.py
 