name: Ingesta de clima

on:
  schedule:
    - cron: "0 * * * *" # Cada hora
  workflow_dispatch: # Permite ejecutarlo manualmente

jobs:
  ingesta:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r tfg_backend/requirements.txt

      - name: Ejecutar script de ingesta
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          AEMET_API_KEY: ${{ secrets.AEMET_API_KEY }}
          PUERTOS_API_KEY: ${{ secrets.PUERTOS_API_KEY }}
        run: |
          python tfg_backend/ingesta_clima.py
