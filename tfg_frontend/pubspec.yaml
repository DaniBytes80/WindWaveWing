name: tfg_clima_malaga
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  uuid: ^4.4.0
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.2
  intl: ^0.20.2
  supabase_flutter: ^2.12.4
  http: ^1.6.0
  json_serializable: ^6.13.2
  json_annotation: ^4.11.0
  geobase: ^1.5.0
  provider: ^6.1.5+1
  image_picker: ^1.1.2
# Dependencias de autenticación
  app_links: ^6.3.2
  google_sign_in: ^6.2.1
  firebase_core: ^4.9.0
  firebase_messaging: ^16.2.2
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.2

# Dependencias para mostrar la webcam
  flutter_inappwebview: ^6.1.5
  video_player: ^2.11.1
# Dependencias del mapa
  flutter_map: ^7.0.2          # el mapa
  flutter_map_cache: ^1.5.0    # caché de tiles offline
  latlong2: ^0.9.1             # coordenadas

  mbtiles: ^0.3.0              # tiles en SQLite (offline España)
  hive_flutter: ^1.1.0        # almacenamiento local para caché de tiles
  url_launcher: ^6.3.2
  flutter_svg: ^2.0.10
# Dependencias para notificaciones  
  flutter_local_notifications: ^18.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icons/icon.png"
  min_sdk_android: 21
